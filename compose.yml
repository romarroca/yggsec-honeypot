services:
  wordpress-honeypot:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: wordpress-honeypot
    restart: unless-stopped
    ports:
      - "8080:8000"
    environment:
      APP_ROLE: honeypot
      SERVE_HONEYPOT: "true"
      SERVE_DASHBOARD: "false"
      ENABLE_COWRIE_INGEST: "false"
      ENABLE_EVENT_CLEANUP: "false"
      TZ: America/Chicago
      APP_DB_PATH: /state/cowrie_map.db
      COWRIE_LOG_PATH: /cowrie/cowrie-var/log/cowrie/cowrie.json
      GEOIP_CITY_DB: /geoip/GeoLite2-City.mmdb
      GEOIP_ASN_DB: /geoip/GeoLite2-ASN.mmdb
      POLL_INTERVAL_SECONDS: "15"
      EVENT_RETENTION_DAYS: "90"
      CLEANUP_INTERVAL_SECONDS: "21600"
      FAKE_SITE_NAME: "Northwind Field Notes"
    volumes:
      - /opt/honeypot/cowrie/cowrie-var:/cowrie/cowrie-var:ro
      - ./data:/state
      - ./geoip:/geoip:ro

  cowrie-dashboard:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: cowrie-dashboard
    restart: unless-stopped
    ports:
      - "8081:8000"
    environment:
      APP_ROLE: dashboard
      SERVE_HONEYPOT: "false"
      SERVE_DASHBOARD: "true"
      ENABLE_COWRIE_INGEST: "true"
      ENABLE_EVENT_CLEANUP: "true"
      TZ: America/Chicago
      APP_DB_PATH: /state/cowrie_map.db
      COWRIE_LOG_PATH: /cowrie/cowrie-var/log/cowrie/cowrie.json
      GEOIP_CITY_DB: /geoip/GeoLite2-City.mmdb
      GEOIP_ASN_DB: /geoip/GeoLite2-ASN.mmdb
      POLL_INTERVAL_SECONDS: "15"
      EVENT_RETENTION_DAYS: "90"
      CLEANUP_INTERVAL_SECONDS: "21600"
      FAKE_SITE_NAME: "Northwind Field Notes"
    volumes:
      - /opt/honeypot/cowrie/cowrie-var:/cowrie/cowrie-var:ro
      - ./data:/state
      - ./geoip:/geoip:ro
